<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobriety Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121212;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #e0e0e0;
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }
        
        /* THE GLASS CONTAINER */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.5);
            width: 340px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        h2 {
            margin-top: 0;
            font-size: 1.3rem;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0.9;
        }
        .interactive-counter {
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s ease;
        }
        .interactive-counter:active {
            transform: scale(0.98);
        }
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 1.5rem 0;
        }
        
        /* THE GLASS COUNTER BOXES */
        .counter-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 14px;
            border-radius: 14px;
            border-bottom: 3px solid #8ec5fc;
        }
        .counter-box.long-span {
            grid-column: span 2;
            border-bottom-color: #ff2e63;
        }
        
        /* THE GLASS SINGLE DISPLAY BOX */
        .single-display-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 24px 14px;
            border-radius: 14px;
            border-bottom: 3px solid #8ec5fc;
            margin: 1.5rem 0;
        }
        .time-value {
            font-size: 2.4rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        .time-label {
            font-size: 0.75rem;
            color: #ddd;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 6px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.5);
        }
        .view-hint {
            font-size: 0.8rem;
            color: #8ec5fc;
            margin-top: 10px;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }
        .menu-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.4rem;
            cursor: pointer;
            color: white;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .menu-icon:hover {
            background: rgba(0, 0, 0, 0.6);
        }
        
        /* DRAWER & SIDEBAR STYLES */
        .drawer {
            position: fixed;
            top: 0; right: -300px;
            width: 280px; height: 100%;
            background: #161616;
            box-shadow: -8px 0 25px rgba(0,0,0,0.6);
            z-index: 100;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2rem 1.5rem;
            box-sizing: border-box;
            text-align: left;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .drawer.open { right: 0; }
        .drawer-content { flex-grow: 1; }
        .drawer h3 { margin-top: 0; color: white; border-bottom: 1px solid #2a2a2a; padding-bottom: 12px; font-weight: 600;}
        .drawer-close { font-size: 1.4rem; cursor: pointer; float: right; color: #666; transition: color 0.2s; }
        .drawer-close:hover { color: #fff; }
        
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        input[type="datetime-local"], select {
            width: 100%; background: #222; color: white; border: 1px solid #333;
            padding: 11px; border-radius: 8px; font-size: 0.9rem; box-sizing: border-box; outline: none;
            transition: border-color 0.2s;
        }
        input[type="datetime-local"]:focus, select:focus {
            border-color: #8ec5fc;
        }
        
        button {
            color: white; border: none; padding: 12px; font-size: 1rem; font-weight: bold;
            border-radius: 8px; cursor: pointer; width: 100%; letter-spacing: 0.5px; transition: all 0.2s ease;
        }
        .btn-primary { background-color: #8ec5fc; color: #121212; margin-top: 10px; }
        .btn-primary:hover { background-color: #b5deff; }
        .btn-danger { background-color: #1a1a1a; color: #ff2e63; border: 1px solid #ff2e63; margin-top: 25px;}
        .btn-danger:hover { background-color: #ff2e63; color: white; }
        .hidden { display: none !important; }

        /* PEERCOACH CREDIT & DONATE LINK */
        .donation-box {
            border-top: 1px solid #2a2a2a;
            padding-top: 20px;
            margin-top: auto;
            text-align: center;
        }
        .donation-box p {
            margin: 0 0 10px 0;
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 0.5px;
        }
        .btn-donate {
            display: block;
            background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-donate:hover {
            background: linear-gradient(135deg, #3c3c3c, #2a2a2a);
            border-color: #8ec5fc;
            box-shadow: 0 4px 20px rgba(142, 197, 252, 0.15);
        }
        .btn-donate span {
            color: #ff2e63;
            margin-left: 4px;
        }
    </style>
</head>
<body>

<div class="menu-icon" id="menuBtn" onclick="toggleDrawer(true)">☰</div>

<div class="drawer" id="sideDrawer">
    <div class="drawer-content">
        <span class="drawer-close" onclick="toggleDrawer(false)">✕</span>
        <h3>Settings</h3>
        
        <div class="input-group">
            <label>Select Theme Background</label>
            <select id="bgSelect" onchange="changeBackground(this.value)">
                <option value="dark">Minimalist Dark</option>
                <option value="sunset">Calming Ocean Sunset (HD)</option>
                <option value="forest">Foggy Pine Forest (HD)</option>
                <option value="flowers">Spring Pink Flowers (HD)</option>
                <option value="mountains">Misty Mountains (HD)</option>
                <option value="stars">Deep Night Sky (HD)</option>
            </select>
            <div style="margin-top: 16px; background: #202020; padding: 12px; border-radius: 8px; border: 1px dashed #333;">
                <label style="font-size: 0.7rem; margin-bottom: 6px;">Use Custom Local Photo</label>
                <input type="file" id="customBgInput" accept="image/*" style="font-size: 0.8rem; color: #888; width: 100%;">
            </div>
        </div>

        <button class="btn-danger" id="resetBtn">RESET SYSTEM DATE</button>
    </div>

    <!-- UPDATED PEERCOACH CREDIT & DONATE SECTION -->
    <div class="donation-box">
        <p>Created by PeerCoach.org</p>
        <a href="https://peercoach.org/app-donate.html" class="btn-donate" target="_blank">
            Support Our Mission <span>❤️</span>
        </a>
    </div>
</div>

<div class="container">
    <div id="setupView">
        <h2>Set Sobriety Date</h2>
        <div class="input-group" style="background: #222; padding: 16px; border-radius: 12px; margin-bottom: 1.5rem; border: 1px solid #2a2a2a;">
            <label for="sobrietyDateTime">Choose Date & Time</label>
            <input type="datetime-local" id="sobrietyDateTime">
        </div>
        <button class="btn-primary" id="saveBtn">START TRACKING</button>
    </div>

    <div id="counterView" class="hidden">
        <h2>Time Sober</h2>
        
        <div class="interactive-counter" id="counterClickZone">
            <div class="counter-grid" id="displayModeStandard">
                <div class="counter-box long-span">
                    <div class="time-value" id="val-years">0</div>
                    <div class="time-label">Years</div>
                </div>
                <div class="counter-box">
                    <div class="time-value" id="val-months">0</div>
                    <div class="time-label">Months</div>
                </div>
                <div class="counter-box">
                    <div class="time-value" id="val-days">0</div>
                    <div class="time-label">Days</div>
                </div>
                <div class="counter-box">
                    <div class="time-value" id="val-hours">0</div>
                    <div class="time-label">Hours</div>
                </div>
                <div class="counter-box">
                    <div class="time-value" id="val-minutes">0</div>
                    <div class="time-label">Minutes</div>
                </div>
            </div>

            <div class="single-display-box hidden" id="displayModeSingle">
                <div class="time-value" id="singleValue">0</div>
                <div class="time-label" id="singleLabel">Days</div>
            </div>

            <div class="view-hint" id="viewHint">Tap counter to shift views</div>
        </div>
    </div>
</div>

<script>
    let savedDate = localStorage.getItem('sobrietyDate');
    let currentMode = parseInt(localStorage.getItem('displayMode') || '0'); 
    let intervalId = null;

    const themes = {
        dark: '#121212',
        sunset: 'url("https://encrypted-tbn1.gstatic.com/licensed-image?q=tbn:ANd9GcTa_nai7Mi3ozhlnqnrp9NS-19iPXmLstB0kUZHFX-5OnKDBaYlmR9l1DXbIH15O3PLdofWNssQpKCnejU")',
        forest: 'url("https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcSMvCihPKfLuIseAe37_peiCxfaR0HQtaOm2-D39NW3IIstvuUKSQYm_2-jdo54ov7UXOVhXd0x3hJOfwA")',
        flowers: 'url("https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcSYF4xi_3EtM3Zr7j55ZtSnUJljK_zSEUXpQFQvu_jqLjMdw-dvhLFWgmBs5JFqoeivNig5JATxhorBr7c")',
        mountains: 'url("https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80")',
        stars: 'url("https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=1200&q=80")'
    };

    const setupView = document.getElementById('setupView');
    const counterView = document.getElementById('counterView');
    const menuBtn = document.getElementById('menuBtn');
    const sideDrawer = document.getElementById('sideDrawer');
    const counterClickZone = document.getElementById('counterClickZone');
    
    const sobrietyDateTimeInput = document.getElementById('sobrietyDateTime');
    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const bgSelect = document.getElementById('bgSelect');
    const customBgInput = document.getElementById('customBgInput');

    const modeStandard = document.getElementById('displayModeStandard');
    const modeSingle = document.getElementById('displayModeSingle');
    const singleValue = document.getElementById('singleValue');
    const singleLabel = document.getElementById('singleLabel');

    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    sobrietyDateTimeInput.value = now.toISOString().slice(0, 16);

    function init() {
        const savedBg = localStorage.getItem('sobrietyBg') || 'dark';
        if (savedBg.startsWith('data:image')) {
            document.body.style.backgroundImage = `url("${savedBg}")`;
        } else {
            bgSelect.value = savedBg;
            changeBackground(savedBg, false);
        }

        if (savedDate) {
            setupView.classList.add('hidden');
            counterView.classList.remove('hidden');
            menuBtn.classList.remove('hidden');
            startCounter();
        } else {
            setupView.classList.remove('hidden');
            counterView.classList.add('hidden');
            menuBtn.classList.add('hidden');
            toggleDrawer(false);
            if (intervalId) clearInterval(intervalId);
        }
    }

    // Drawer state controls
    function toggleDrawer(open) {
        if (open) sideDrawer.classList.add('open');
        else sideDrawer.classList.remove('open');
    }

    function changeBackground(themeKey, persist = true) {
        if (themes[themeKey]) {
            if (themeKey === 'dark') {
                document.body.style.backgroundImage = 'none';
                document.body.style.backgroundColor = themes.dark;
            } else {
                document.body.style.backgroundImage = themes[themeKey];
            }
            if (persist) localStorage.setItem('sobrietyBg', themeKey);
        }
    }

    customBgInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Url = event.target.result;
                document.body.style.backgroundImage = `url("${base64Url}")`;
                localStorage.setItem('sobrietyBg', base64Url);
            };
            reader.readAsDataURL(file);
        }
    });

    counterClickZone.addEventListener('click', () => {
        currentMode = (currentMode + 1) % 4;
        localStorage.setItem('displayMode', currentMode);
        updateCounter();
    });

    function startCounter() {
        updateCounter();
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(updateCounter, 1000);
    }

    function updateCounter() {
        if (!savedDate) return;
        const startDate = new Date(savedDate);
        const currentDate = new Date();
        
        let diffMs = currentDate - startDate;
        if (diffMs < 0) diffMs = 0;

        const totalSeconds = Math.floor(diffMs / 1000);
        const totalMinutes = Math.floor(totalSeconds / 60);
        const totalHours = Math.floor(totalMinutes / 60);
        const totalDays = Math.floor(totalHours / 24);

        if (currentMode === 0) {
            modeStandard.classList.remove('hidden');
            modeSingle.classList.add('hidden');

            let years = currentDate.getFullYear() - startDate.getFullYear();
            let months = currentDate.getMonth() - startDate.getMonth();
            let days = currentDate.getDate() - startDate.getDate();

            if (days < 0) {
                const prevMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0);
                days += prevMonth.getDate();
                months--;
            }
            if (months < 0) {
                months += 12;
                years--;
            }

            document.getElementById('val-years').textContent = years;
            document.getElementById('val-months').textContent = months;
            document.getElementById('val-days').textContent = days;
            document.getElementById('val-hours').textContent = totalHours % 24;
            document.getElementById('val-minutes').textContent = totalMinutes % 60;
        } else {
            modeStandard.classList.add('hidden');
            modeSingle.classList.remove('hidden');

            if (currentMode === 1) {
                singleValue.textContent = totalDays.toLocaleString();
                singleLabel.textContent = "Total Days";
            } else if (currentMode === 2) {
                singleValue.textContent = totalHours.toLocaleString();
                singleLabel.textContent = "Total Hours";
            } else if (currentMode === 3) {
                singleValue.textContent = totalSeconds.toLocaleString();
                singleLabel.textContent = "Total Seconds";
            }
        }
    }

    saveBtn.addEventListener('click', () => {
        const val = sobrietyDateTimeInput.value;
        if (!val) return;
        localStorage.setItem('sobrietyDate', val);
        savedDate = val;
        init();
    });

    resetBtn.addEventListener('click', () => {
        if (confirm("Are you entirely sure you want to change or reset your milestones?")) {
            localStorage.removeItem('sobrietyDate');
            savedDate = null;
            init();
        }
    });

    init();
</script>

</body>
</html>
